<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Document -->
  <path fill="#FDE2A1" stroke="#000" stroke-width="24" stroke-linejoin="round"
        d="M376 40H136c-22 0-40 18-40 40v352c0 22 18 40 40 40h240c22 0 40-18 40-40V120L376 40z" />
  <!-- Fold -->
  <path fill="#E6B863" stroke="#000" stroke-width="24" stroke-linejoin="round"
        d="M376 40v80h80z" />
  <!-- Document Lines -->
  <line x1="160" y1="120" x2="280" y2="120" stroke="#000" stroke-width="24" stroke-linecap="round"/>
  <line x1="160" y1="170" x2="350" y2="170" stroke="#000" stroke-width="24" stroke-linecap="round"/>
  <!-- Document Dollar Sign -->
  <text x="210" y="320" font-family="sans-serif" font-weight="900" font-size="160" fill="#000" text-anchor="middle">$</text>

  <!-- Coin Stack (Bottom Left) -->
  <rect x="40" y="380" width="160" height="50" rx="24" fill="#FFAA00" stroke="#000" stroke-width="24" />
  <rect x="60" y="340" width="140" height="50" rx="24" fill="#FFAA00" stroke="#000" stroke-width="24" />
  <rect x="50" y="300" width="150" height="50" rx="24" fill="#FFC933" stroke="#000" stroke-width="24" />
  
  <!-- Front Coin -->
  <circle cx="100" cy="420" r="70" fill="#FFC933" stroke="#000" stroke-width="24" />
  <!-- Coin inner rim -->
  <circle cx="100" cy="420" r="50" fill="none" stroke="#E19D12" stroke-width="8" />
  <!-- Front Coin Dollar Sign -->
  <text x="100" y="455" font-family="sans-serif" font-weight="900" font-size="95" fill="#000" text-anchor="middle">$</text>

  <!-- Calculator (Bottom Right) -->
  <rect x="220" y="190" width="220" height="300" rx="40" fill="#6CCB76" stroke="#000" stroke-width="24" />
  <rect x="230" y="200" width="200" height="280" rx="30" fill="#8AE293" />
  
  <!-- Screen -->
  <rect x="250" y="230" width="160" height="60" rx="16" fill="#3B92F6" stroke="#000" stroke-width="24" />
  <rect x="255" y="235" width="150" height="50" rx="12" fill="#5AA8FF" />
  
  <!-- Buttons -->
  <rect x="250" y="330" width="40" height="40" rx="8" fill="#3A8A4A" stroke="#000" stroke-width="16" />
  <rect x="310" y="330" width="40" height="40" rx="8" fill="#3A8A4A" stroke="#000" stroke-width="16" />
  <rect x="370" y="330" width="40" height="40" rx="8" fill="#FF9100" stroke="#000" stroke-width="16" />
  
  <rect x="250" y="390" width="40" height="40" rx="8" fill="#3A8A4A" stroke="#000" stroke-width="16" />
  <rect x="310" y="390" width="40" height="40" rx="8" fill="#3A8A4A" stroke="#000" stroke-width="16" />
  <rect x="370" y="390" width="40" height="100" rx="8" fill="#FF9100" stroke="#000" stroke-width="16" />
  
  <rect x="250" y="450" width="40" height="40" rx="8" fill="#3A8A4A" stroke="#000" stroke-width="16" />
  <rect x="310" y="450" width="40" height="40" rx="8" fill="#3A8A4A" stroke="#000" stroke-width="16" />
</svg>
